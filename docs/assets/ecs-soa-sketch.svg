<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ECS archetype SoA storage</title>
  <desc id="desc">Archetype tables store dense entity rows and CPU-only component byte columns. Builtin GlobalTransform and Camera upload data through dedicated packed GPU blobs.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #9aa4b2; stroke-width: 2; rx: 8; }
      .column { fill: #e6f0ff; stroke: #5c7fb8; stroke-width: 1.5; rx: 5; }
      .blob { fill: #eef7e6; stroke: #6b9855; stroke-width: 1.5; rx: 5; }
      .text { font: 15px sans-serif; fill: #1d2433; }
      .title { font: 22px sans-serif; font-weight: 700; fill: #1d2433; }
      .label { font: 14px sans-serif; fill: #344054; }
      .small { font: 12px sans-serif; fill: #536070; }
      .arrow { stroke: #667085; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="540"/>
  <text x="40" y="48" class="title">Archetype SoA rows + builtin packed GPU blobs</text>
  <text x="40" y="74" class="label">All ECS components are CPU-only SoA rows; renderer upload data uses dedicated builtin blobs.</text>

  <rect x="40" y="120" width="540" height="300" class="panel"/>
  <text x="66" y="154" class="text">Archetype: [Transform3D, GlobalTransform, ChildOf]</text>
  <rect x="70" y="185" width="110" height="190" class="column"/>
  <rect x="205" y="185" width="110" height="190" class="column"/>
  <rect x="340" y="185" width="110" height="190" class="column"/>
  <text x="88" y="212" class="label">EntityId</text>
  <text x="224" y="212" class="label">Transform3D</text>
  <text x="356" y="212" class="label">GlobalRef</text>
  <text x="88" y="250" class="small">e0</text>
  <text x="88" y="292" class="small">e1</text>
  <text x="88" y="334" class="small">e2</text>
  <text x="224" y="250" class="small">TRS bytes</text>
  <text x="224" y="292" class="small">TRS bytes</text>
  <text x="224" y="334" class="small">TRS bytes</text>
  <text x="356" y="250" class="small">fmt/off</text>
  <text x="356" y="292" class="small">fmt/off</text>
  <text x="356" y="334" class="small">fmt/off</text>
  <text x="66" y="402" class="small">Entity moves copy overlapping CPU columns; row views are borrowed only inside callbacks.</text>

  <rect x="640" y="120" width="260" height="120" class="panel"/>
  <text x="666" y="154" class="text">ComponentRegistry</text>
  <text x="666" y="184" class="small">id, name, cpu_stride</text>
  <text x="666" y="210" class="small">No component kind split</text>

  <rect x="640" y="290" width="260" height="130" class="panel"/>
  <text x="666" y="324" class="text">Builtin Packed Blobs</text>
  <rect x="666" y="345" width="92" height="44" class="blob"/>
  <rect x="778" y="345" width="92" height="44" class="blob"/>
  <text x="681" y="372" class="small">Global</text>
  <text x="795" y="372" class="small">Camera</text>
  <text x="666" y="407" class="small">resize/write queues return GpuWriteView</text>

  <path d="M450 250 C560 235, 575 185, 640 180" class="arrow"/>
  <path d="M450 292 C560 310, 578 356, 640 356" class="arrow"/>
</svg>
