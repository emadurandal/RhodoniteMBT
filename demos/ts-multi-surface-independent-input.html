<html lang="ja">

    <title>TypeScript WebGPU — multi-surface-independent-input</title>

  <body>
    <div id="app">
      <h1>TypeScript WebGPU multi-surface-independent-input</h1>
      <p>
        1つの TypeScript Platform/Engine tick で2つの Canvas Surface を描画し、surface-local input で
        それぞれ独立した scene graph camera を操作します。
      </p>
      <div class="surface-grid">
        <section>
          <h2>Surface A</h2>
          <canvas id="webgpu-canvas-a" width="800" height="600"></canvas>
        </section>
        <section>
          <h2>Surface B</h2>
          <canvas id="webgpu-canvas-b" width="800" height="600"></canvas>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main-ts-multi-surface-independent-input.ts"></script>
  </body>
